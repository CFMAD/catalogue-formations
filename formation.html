<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Formation - CFMAD</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<section class="banniere-formation">
    <img id="imageFormation" src="" alt="Formation">
</section>
    
    <h1 id="titre"></h1>

    <p id="categorie"></p>

</header>

<main class="fiche">

    <section>

        <h2>Présentation</h2>
        <p id="presentation"></p>

    </section>

    <section>

        <h2>Objectifs</h2>
        <div id="objectifs"></div>

    </section>

    <section>

        <h2>Formateur</h2>
        <p id="formateur"></p>

    </section>

    <section>

        <h2>Informations pratiques</h2>

        <p><strong>Public :</strong> <span id="public"></span></p>

        <p><strong>Nombre de participants :</strong> <span id="participants"></span></p>

        <p><strong>Tarif :</strong> <span id="tarif"></span></p>
        <p><strong>Date :</strong> <span id="date"></span></p>
        
    </section>

    <div style="margin-top:40px">

<button id="btnDemande">
📩 Demander cette formation
</button>

    </div>

    <br><br>

    
<div class="retour">
    <a href="formations.html" class="btn-retour">
        ← Retour au catalogue
    </a>
</div>

</main>

<script src="data/formations.js"></script>
<script src="js/formation.js"></script>

</body>

</html>
