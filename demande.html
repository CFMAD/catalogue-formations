<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Demande de formation - CFMAD</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Demande de formation</h1>

<p>Complétez ce formulaire. Nous reprendrons contact avec vous rapidement.</p>

</header>

<main class="fiche">

<section>

<h2>Votre demande</h2>

<form id="demandeForm">

<label>Formation</label>

<input
type="text"
id="formation"
readonly>

<br><br>

<label>Nom</label>

<input
type="text"
id="nom"
required>

<br><br>

<label>Prénom</label>

<input
type="text"
id="prenom"
required>

<br><br>

<label>Organisme</label>

<input
type="text"
id="organisme"
required>

<br><br>

<label>Email</label>

<input
type="email"
id="email"
required>

<br><br>

<label>Téléphone</label>

<input
type="tel"
id="telephone">

<br><br>

<label>Période(s) souhaitée(s)</label>

<input
type="text"
id="dates">

<br><br>

<label>Message</label>

<textarea
id="message"
rows="6"></textarea>

<br><br>

<button type="submit">

📩 Envoyer la demande

</button>

</form>

</section>

</main>

<script src="data/formations.js"></script>
<script src="js/demande.js"></script>

</body>

</html>
