<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Demande de formation - CFMAD</title>

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

<h1>Demande de formation</h1>

<p>Complétez ce formulaire. Nous reprendrons contact avec vous rapidement.</p>

</header>

<main class="demande-page">

<div class="demande-card">

    <div class="formation-rappel">

        <span>📚 Formation demandée</span>

        <h2 id="titreFormation"></h2>

    </div>

    <form id="demandeForm">

        <label for="formation">Formation</label>
        <input type="text" id="formation" readonly>

        <label for="nom">Nom *</label>
        <input type="text" id="nom" required>

        <label for="prenom">Prénom *</label>
        <input type="text" id="prenom" required>

        <label for="organisme">Organisme *</label>
        <input type="text" id="organisme" required>

        <label for="email">Email *</label>
        <input type="email" id="email" required>

        <label for="telephone">Téléphone</label>
        <input type="tel" id="telephone">

        <label for="dates">Période souhaitée</label>
        <input type="text" id="dates">

        <label for="message">Message</label>
        <textarea id="message" rows="6"></textarea>

        <button type="submit">

            📩 Envoyer ma demande

        </button>

    </form>

</div>

</main>


<script src="data/formations.js"></script>
<script src="js/demande.js"></script>

</body>

</html>
