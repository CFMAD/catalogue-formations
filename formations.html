<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Catalogue des formations - CFMAD</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <h1>Catalogue des formations</h1>

    <p>CFMAD - Centre de Formation</p>

</header>

<section class="hero">

<h2>Développez les compétences de vos équipes</h2>

<p>

Le CFMAD accompagne les professionnels de terrain grâce à un catalogue de formations
adaptables aux réalités des services, dispensées dans vos locaux ou au sein de notre centre.

</p>

</section>
    
<section class="recherche">

    <input
        type="text"
        id="searchInput"
        placeholder="Rechercher une formation..."
    >

</section>

    
<div class="filtres">

<button data-filtre="Toutes">Toutes</button>

<button class="cat-prevention"
        data-filtre="Prévention, santé et sensibilisation">
Prévention
</button>

<button class="cat-cadre"
        data-filtre="Cadre professionnel">
Cadre professionnel
</button>

<button class="cat-equipe"
        data-filtre="Travailler en équipe">
Travailler en équipe
</button>

<button class="cat-domicile"
        data-filtre="Le métier à domicile et ses spécificités pratiques">
Métier à domicile
</button>

<button class="cat-pack"
        data-filtre="Les packs professionnels">
Packs professionnels
</button>

</div>

    
<main>

    <div id="formationsContainer" class="cards"></div>

</main>

<script src="data/formations.js"></script>
<script src="js/app.js"></script>

</body>

</html>
